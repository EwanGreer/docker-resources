services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_DOMAIN=${CADDY_DOMAIN:-localhost}
    networks:
      - networking

  whoami:
    image: traefik/whoami
    restart: unless-stopped
    networks:
      - networking

volumes:
  caddy_data:
  caddy_config:

networks:
  networking:
    name: networking
