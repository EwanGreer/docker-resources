services:
  nats:
    container_name: nats
    image: nats:alpine
    restart: unless-stopped
    ports:
      - ${NATS_PORT:-4222}:4222
      - ${NATS_MONITOR_PORT:-8222}:8222
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:8222/healthz -O /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  nats-init:
    container_name: nats-init
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_STREAMS: ${NATS_STREAMS:-}
    entrypoint: ["/nats-init-entrypoint.sh"]
    volumes:
      - ./nats-init-entrypoint.sh:/nats-init-entrypoint.sh:ro

  nats-box:
    container_name: nats-box
    image: natsio/nats-box:latest
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  nats_data:
